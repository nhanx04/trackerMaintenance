spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: tracker_maintenance_service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  sql:
    init:
      mode: never

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 300
  refreshable-duration: 1800
