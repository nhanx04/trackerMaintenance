trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: 'tracker-be'

steps:
- task: Docker@2
  displayName: Build and Push Docker Image
  inputs:
    containerRegistry: 'acr-connection' 
    repository: '$(imageName)'
    command: 'buildAndPush'
    Dockerfile: '**/be/Dockerfile' 
    tags: |
      latest
      $(Build.BuildId)