trigger:
  branches:
    include:
      - main
  paths:
    include:
      - tracker_maintenance_service/**

variables:
- name: imageName
  value: 'tracker-be'

stages:
- stage: __default
  jobs:
  - job: Job
    pool:
      name: Default  
    steps:
    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'acr-connection'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'tracker_maintenance_service/Dockerfile'
        tags: |
          latest
          $(Build.BuildId)